<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SC Ool | The Director</title>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }

        .portrait-frame {
            position: relative; width: 320px; height: 400px;
            border: 2px solid #1a1a1a; border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 60px rgba(0, 0, 0, 1);
        }

        #director-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75) contrast(1.1) grayscale(10%); transition: 0.5s; }

        /* THE REAL LIPS */
        #mouth {
            position: absolute;
            top: 64.5%; /* Adjust with Y slider */
            left: 50%;   /* Adjust with X slider */
            width: 75px; /* Adjust with Width slider */
            transform: translateX(-50%) scaleY(0.1);
            display: none;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            opacity: 0.9;
        }

        /* JAW SHADOW */
        #jaw-shadow {
            position: absolute;
            top: 66%; left: 50%;
            width: 60px; height: 15px;
            background: rgba(0,0,0,0.8);
            transform: translateX(-50%) scale(0);
            border-radius: 50%;
            filter: blur(8px);
            z-index: 5;
        }

        .speaking #mouth { display: block; }
        .speaking #director-img { filter: brightness(1) grayscale(0%); }

        .controls { margin-top: 30px; text-align: center; }
        .awaken-btn { 
            background: #ff003c; color: white; border: none; 
            padding: 16px 45px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; border-radius: 5px; letter-spacing: 5px;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
        }

        .calibrator { margin-top: 20px; padding: 10px; background: #111; border: 1px solid #222; border-radius: 8px; font-size: 10px; color: #666; }
        input[type=range] { width: 150px; accent-color: #ff003c; }
    </style>
</head>
<body>

    <div class="portrait-frame" id="stage">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img">
        <img src="lips.png" id="mouth">
        <div id="jaw-shadow" id="jaw"></div>
    </div>

    <div class="controls">
        <button class="awaken-btn" onclick="startShow()">AWAKEN</button>
        
        <div class="calibrator">
            Y: <input type="range" min="50" max="85" value="64.5" step="0.1" oninput="moveMouth('top', this.value)">
            X: <input type="range" min="40" max="60" value="50" step="0.1" oninput="moveMouth('left', this.value)">
            SIZE: <input type="range" min="40" max="150" value="75" step="1" oninput="resizeMouth(this.value)">
        </div>
    </div>

    <audio id="vocal" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('vocal');
        const mouth = document.getElementById('mouth');
        const jaw = document.getElementById('jaw-shadow');
        const stage = document.getElementById('stage');

        let audioCtx, analyser, source, dataArray;

        function moveMouth(dir, val) { mouth.style[dir] = val + '%'; }
        function resizeMouth(val) { mouth.style.width = val + 'px'; }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        function startShow() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (audio.paused) {
                audio.play();
                stage.classList.add('speaking');
                syncLoop();
            } else {
                audio.pause();
                stage.classList.remove('speaking');
            }
        }

        function syncLoop() {
            if (audio.paused) return;
            requestAnimationFrame(syncLoop);
            
            analyser.getByteFrequencyData(dataArray);
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 10) { 
                // Lips open vertically based on volume
                let openScale = 0.3 + (volume / 20); 
                mouth.style.transform = `translateX(-50%) scaleY(${openScale})`;
                
                // Shadow follows the jaw
                jaw.style.transform = `translateX(-50%) translateY(${volume/6}px) scale(${1 + (volume/50)})`;
                jaw.style.opacity = volume / 40;
            } else {
                mouth.style.transform = `translateX(-50%) scaleY(0.1)`;
                jaw.style.opacity = 0;
            }
        }

        audio.onended = () => stage.classList.remove('speaking');
    </script>
</body>
</html>
