<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Ool | The Director Speaks</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* The Director's Portrait */
        .portrait-container {
            position: relative;
            width: 320px;
            height: 400px;
            border: 2px solid #222;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.1);
        }

        #director-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(40%);
        }

        /* TALKING ANIMATION: Triggered via JavaScript */
        .talking {
            animation: mouthMove 0.15s infinite alternate, glow 2s infinite alternate;
            border-color: #ff003c !important;
            filter: grayscale(0%) !important;
        }

        @keyframes mouthMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.03) translateY(-2px); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }
            100% { box-shadow: 0 0 60px rgba(255, 0, 60, 0.6); }
        }

        .controls {
            margin-top: 40px;
            text-align: center;
        }

        .awaken-btn {
            background: #ff003c;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 3px;
            border-radius: 5px;
        }

        .status-text {
            margin-top: 15px;
            color: #ffcc00;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="portrait-container" id="frame">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img" alt="The Director">
    </div>

    <div class="controls">
        <button class="awaken-btn" onclick="awaken()">AWAKEN</button>
        <p class="status-text" id="status">[ Awaiting Reflection ]</p>
    </div>

    <audio id="manifesto-audio" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('manifesto-audio');
        const img = document.getElementById('director-img');
        const frame = document.getElementById('frame');
        const status = document.getElementById('status');

        function awaken() {
            if (audio.paused) {
                audio.play();
                frame.classList.add('talking');
                status.innerText = "WAKE UP!!!!!!!!";
            } else {
                audio.pause();
                frame.classList.remove('talking');
                status.innerText = "PAUSED.";
            }
        }

        // Stop the "talking" when the manifesto ends
        audio.onended = function() {
            frame.classList.remove('talking');
            status.innerText = "REMEMBER YOUR REFLECTION.";
        };
    </script>

</body>
</html>
