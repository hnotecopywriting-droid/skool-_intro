<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SC Ool | The Awakened One</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
        
        .portrait-container {
            position: relative; width: 350px; height: 450px;
            border: 2px solid #222; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 60, 0.2);
        }

        #director-img { width: 100%; height: 100%; object-fit: cover; }

        /* THE LIP-SYNC ENGINE */
        .mouth-shape {
            position: absolute;
            top: 64%; /* Positioned over the mouth area */
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 10px;
            background: rgba(10, 0, 0, 0.9);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            transition: transform 0.05s ease-out;
            box-shadow: 0 0 10px #ff003c;
        }

        .active .mouth-shape { opacity: 1; }

        .btn-awaken {
            margin-top: 40px; padding: 20px 50px; background: #ff003c; color: white;
            border: none; font-weight: bold; cursor: pointer; letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="portrait-container" id="frame">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img">
        <div class="mouth-shape" id="mouth"></div>
    </div>

    <button class="btn-awaken" onclick="toggleAudition()">AWAKEN</button>
    <audio id="vocal" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('vocal');
        const mouth = document.getElementById('mouth');
        const frame = document.getElementById('frame');

        // Web Audio API to "Listen" to the audio file
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 256;

        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function animateMouth() {
            analyser.getByteFrequencyData(dataArray);
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            // This makes the "shadow" expand and contract based on volume
            if (volume > 20) {
                let scale = 1 + (volume / 25);
                mouth.style.transform = `translateX(-50%) scaleY(${scale})`;
            } else {
                mouth.style.transform = `translateX(-50%) scaleY(1)`;
            }

            requestAnimationFrame(animateMouth);
        }

        function toggleAudition() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (audio.paused) {
                audio.play();
                frame.classList.add('active');
                animateMouth();
            } else {
                audio.pause();
                frame.classList.remove('active');
            }
        }
    </script>
</body>
</html>
