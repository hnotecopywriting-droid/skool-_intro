<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SC Ool | The Director</title>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }

        .portrait-frame {
            position: relative; width: 320px; height: 400px;
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        #director-img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.6) contrast(1.2) grayscale(30%); 
        }

        /* YOUR LIPS - The black background will disappear */
        #mouth {
            position: absolute;
            top: 64%; left: 50%;
            width: 65px; 
            transform: translateX(-50%) scaleY(0.1);
            display: none;
            z-index: 10;
            /* MAGIC MODE: Hides Black Background */
            mix-blend-mode: screen; 
            filter: brightness(1.1) contrast(1.1);
        }

        .speaking #mouth { display: block; }

        .controls { margin-top: 40px; text-align: center; }
        .awaken-btn { 
            background: #ff003c; color: white; border: none; padding: 18px 50px; 
            cursor: pointer; border-radius: 5px; letter-spacing: 5px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }

        /* Tools to lock in the placement */
        .calibrator { margin-top: 20px; padding: 10px; background: #111; border-radius: 10px; font-size: 10px; color: #555; border: 1px solid #222; }
        input[type=range] { width: 120px; accent-color: #ff003c; }
    </style>
</head>
<body>

    <div class="portrait-frame" id="stage">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img">
        <img src="lips.png" id="mouth">
    </div>

    <div class="controls">
        <button class="awaken-btn" onclick="startShow()">AWAKEN</button>
        <div class="calibrator">
            POSITION: <input type="range" min="55" max="75" value="64" step="0.1" oninput="moveMouth('top', this.value)">
            SIZE: <input type="range" min="40" max="120" value="65" step="1" oninput="resizeMouth(this.value)">
        </div>
    </div>

    <audio id="vocal" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('vocal');
        const mouth = document.getElementById('mouth');
        const stage = document.getElementById('stage');

        let audioCtx, analyser, source, dataArray;

        function moveMouth(dir, val) { mouth.style[dir] = val + '%'; }
        function resizeMouth(val) { mouth.style.width = val + 'px'; }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        function startShow() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) {
                audio.play();
                stage.classList.add('speaking');
                sync();
            } else {
                audio.pause();
                stage.classList.remove('speaking');
            }
        }

        function sync() {
            if (audio.paused) return;
            requestAnimationFrame(sync);
            analyser.getByteFrequencyData(dataArray);
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
            if (volume > 10) { 
                // Using a slightly more aggressive scale to show off your real lips
                mouth.style.transform = `translateX(-50%) scaleY(${0.3 + (volume / 20)})`;
            } else {
                mouth.style.transform = `translateX(-50%) scaleY(0.1)`;
            }
        }
    </script>
</body>
</html>
