<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SC Ool | The Director</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; }
        
        .stage { position: relative; width: 320px; height: 400px; border: 2px solid #333; overflow: hidden; }
        #director-img { width: 100%; height: 100%; object-fit: cover; }

        /* THE MOUTH ANIMATION */
        /* This creates a physical "vibration" in the mouth area when active */
        .mouth-trigger {
            position: absolute;
            top: 65%; left: 50%;
            width: 60px; height: 20px;
            background: rgba(0,0,0,0.7);
            transform: translateX(-50%);
            border-radius: 50%;
            filter: blur(5px);
            display: none; /* Hidden until audio plays */
        }

        .speaking .mouth-trigger {
            display: block;
            animation: lipSync 0.15s infinite;
        }

        @keyframes lipSync {
            0% { transform: translateX(-50%) scaleY(0.2); }
            100% { transform: translateX(-50%) scaleY(1.8); }
        }

        .btn { margin-top: 30px; padding: 15px 40px; background: #ff003c; color: white; border: none; cursor: pointer; font-weight: bold; }
        #debug { margin-top: 10px; color: #555; font-size: 10px; }
    </style>
</head>
<body>

    <div class="stage" id="the-stage">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img">
        <div class="mouth-trigger"></div>
    </div>

    <button class="btn" onclick="startShow()">AWAKEN THE DIRECTOR</button>
    
    <audio id="vocal">
        <source src="leas role.m4a" type="audio/x-m4a">
        <source src="leas role.m4a" type="audio/mp4">
    </audio>

    <p id="debug">Status: Ready</p>

    <script>
        const audio = document.getElementById('vocal');
        const stage = document.getElementById('the-stage');
        const debug = document.getElementById('debug');

        function startShow() {
            debug.innerText = "Attempting to play...";
            
            audio.play().then(() => {
                debug.innerText = "Status: SPEAKING";
                stage.classList.add('speaking');
            }).catch(err => {
                debug.innerText = "Error: " + err.message;
                console.error(err);
            });
        }

        audio.onended = () => {
            stage.classList.remove('speaking');
            debug.innerText = "Status: FINISHED";
        };
    </script>
</body>
</html>
