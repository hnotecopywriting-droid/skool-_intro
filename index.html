<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Ool | The Director</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; 
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        /* THE STAGE: Your Portrait */
        .portrait-frame {
            position: relative; width: 320px; height: 400px;
            border: 2px solid #222; border-radius: 15px;
            overflow: hidden; transition: 0.5s;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.1);
        }

        #director-img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(40%); transition: 0.4s;
        }

        /* THE MOUTH: The Physical Sync Layer */
        .mouth-trigger {
            position: absolute;
            top: 64%; left: 50%;
            width: 55px; height: 10px;
            background: rgba(10, 0, 0, 0.95);
            transform: translateX(-50%) scaleY(0.1);
            border-radius: 50%;
            filter: blur(4px);
            box-shadow: 0 0 12px rgba(255, 0, 60, 0.4);
            display: none; /* Only shows when 'Awaken' is clicked */
        }

        /* ACTIVE STATE: When speaking */
        .speaking .mouth-trigger { display: block; }
        .speaking #director-img { filter: grayscale(0%); transform: scale(1.02); }

        .controls { margin-top: 40px; text-align: center; }
        
        .awaken-btn {
            background: #ff003c; color: white; border: none;
            padding: 18px 50px; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; letter-spacing: 4px; border-radius: 5px;
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 0, 60, 0.3);
        }

        .status-text { margin-top: 20px; color: #ffcc00; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="portrait-frame" id="stage">
        <img src="Gemini_Generated_Image_ns8mwuns8mwuns8m.jpg" id="director-img" alt="The Director">
        <div class="mouth-trigger" id="mouth"></div>
    </div>

    <div class="controls">
        <button class="awaken-btn" onclick="startShow()">AWAKEN</button>
        <p class="status-text" id="status">[ AWAITING REFLECTION ]</p>
    </div>

    <audio id="vocal" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('vocal');
        const mouth = document.getElementById('mouth');
        const stage = document.getElementById('stage');
        const status = document.getElementById('status');

        let audioCtx, analyser, source, dataArray;

        function initAudio() {
            // Context must be created after user gesture
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; // Low FFT size for bass/vocal frequency focus
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        function startShow() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (audio.paused) {
                audio.play();
                stage.classList.add('speaking');
                status.innerText = "WAKE UP!!!!!!!!";
                syncLoop();
            } else {
                audio.pause();
                stage.classList.remove('speaking');
                status.innerText = "PAUSED.";
            }
        }

        function syncLoop() {
            if (audio.paused) return;
            requestAnimationFrame(syncLoop);
            
            analyser.getByteFrequencyData(dataArray);
            
            // Calculate Vocal Intensity
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            // Lip Sync Logic: Maps your volume to the mouth scale
            if (volume > 15) { 
                let intensity = 0.5 + (volume / 35); 
                mouth.style.transform = `translateX(-50%) scaleY(${intensity})`;
            } else {
                mouth.style.transform = `translateX(-50%) scaleY(0.1)`;
            }
        }

        audio.onended = () => {
            stage.classList.remove('speaking');
            status.innerText = "REMEMBER YOUR REFLECTION.";
            mouth.style.transform = `translateX(-50%) scaleY(0.1)`;
        };
    </script>
</body>
</html>
