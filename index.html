<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Awakened Ones | SC Ool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        body { 
            margin: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; 
            font-family: 'Cinzel', serif; overflow: hidden;
        }

        .portrait-frame {
            position: relative; width: 550px; height: 550px; 
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,1);
            border: 1px solid #1a1a1a;
        }

        #director-img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: brightness(0.75) contrast(1.1); 
        }

        /* THE LIPS - MIRRORED AND FULLY MOBILE */
        #mouth {
            position: absolute;
            top: 40%; /* Unlocked for high placement */
            left: 75%; /* Unlocked for right-side placement */
            width: 50px; 
            /* scaleX(-1) mirrors your lips to face the Celestial side */
            transform: translateX(-50%) scaleX(-1) scaleY(0.1);
            display: none;
            z-index: 10;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.1);
        }

        .speaking #mouth { display: block; }

        .controls { margin-top: 30px; text-align: center; z-index: 100; }
        
        .awaken-btn { 
            background: transparent; color: #ffcc00; border: 1px solid #ffcc00; 
            padding: 15px 50px; font-size: 1.1rem; cursor: pointer; 
            letter-spacing: 6px; transition: 0.4s;
        }
        .awaken-btn:hover { background: #ffcc00; color: #000; box-shadow: 0 0 30px rgba(255,200,0,0.3); }

        /* THE UNLOCKED CALIBRATOR */
        .calibrator { 
            margin-top: 25px; padding: 15px; background: #0a0a0a; 
            border: 1px solid #222; border-radius: 5px; 
            font-size: 10px; color: #ffcc00; letter-spacing: 1px;
        }
        .calibrator label { display: block; margin-top: 10px; opacity: 0.5; }
        input[type=range] { width: 250px; accent-color: #ffcc00; cursor: pointer; }
    </style>
</head>
<body>

    <div class="portrait-frame" id="stage">
        <img src="Gemini_Generated_Image_1dduq31dduq31ddu.jpg" id="director-img">
        <img src="lips.png" id="mouth">
    </div>

    <div class="controls">
        <button class="awaken-btn" onclick="startShow()">AWAKEN</button>
        
        <div class="calibrator">
            <label>UP & DOWN (DRIVE TO THE FACE)</label>
            <input type="range" min="5" max="95" value="40" step="0.1" oninput="moveMouth('top', this.value)">
            
            <label>LEFT & RIGHT (DRIVE TO THE COUNSELOR)</label>
            <input type="range" min="10" max="95" value="75" step="0.1" oninput="moveMouth('left', this.value)">
            
            <label>LIP SCALE</label>
            <input type="range" min="10" max="200" value="50" step="1" oninput="resizeMouth(this.value)">
        </div>
    </div>

    <audio id="vocal" src="leas role.m4a"></audio>

    <script>
        const audio = document.getElementById('vocal');
        const mouth = document.getElementById('mouth');
        const stage = document.getElementById('stage');

        let audioCtx, analyser, source, dataArray;

        function moveMouth(dir, val) { mouth.style[dir] = val + '%'; }
        function resizeMouth(val) { mouth.style.width = val + 'px'; }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        function startShow() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) {
                audio.play();
                stage.classList.add('speaking');
                sync();
            } else {
                audio.pause();
                stage.classList.remove('speaking');
            }
        }

        function sync() {
            if (audio.paused) return;
            requestAnimationFrame(sync);
            analyser.getByteFrequencyData(dataArray);
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 5) { 
                // Maintaining the Flip while speaking
                mouth.style.transform = `translateX(-50%) scaleX(-1) scaleY(${0.3 + (volume / 18)})`;
            } else {
                mouth.style.transform = `translateX(-50%) scaleX(-1) scaleY(0.1)`;
            }
        }
        
        audio.onended = () => { stage.classList.remove('speaking'); };
    </script>
</body>
</html>
